name: ML Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" # Matches your local environment
      
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        # Setting PYTHONPATH ensures src/ imports work in tests/
        run: PYTHONPATH=src python -m pytest tests/ -v
  
  train:
    name: Train and Evaluate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Running main.py usually triggers the full pipeline
      - name: Train and Evaluate Model
        run: python src/main.py

      - name: Upload MLflow Runs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-results
          path: mlruns/ # Uploads all experiment data