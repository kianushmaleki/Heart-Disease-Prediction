# model 1
model:
  type: "logistic_regression"  # options: logistic_regression, random_forest, gradient_boosting
  params:
    random_state: 42

    # Model-specific hyperparameters
    # Logistic Regression
    lr_C: 1.0                          # regularization strength

    # Random Forest
    rf_n_estimators: 100               # number of trees
    rf_max_depth: null                 # null in YAML = None in Python
    rf_min_samples_split: 5

    # Gradient Boosting
    gb_n_estimators: 100               # number of trees
    gb_learning_rate: 0.1
    gb_max_depth: 3
    gb_min_samples_split: 2
    gb_min_samples_leaf: 1

data:
  train_X_path: data/X_train.csv
  train_y_path: data/y_train.csv
  test_X_path: data/X_test.csv
  test_y_path: data/y_test.csv

